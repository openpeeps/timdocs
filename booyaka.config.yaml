metadata:
  logo: "/assets/booyaka.png"
  title: "Tim Engine Documentation"
  description: "Documentation page for Tim Engine - a powerful template engine and scripting language for developers."
  keywords: ["tim", "template", "templating", "template engine", "scripting language"]

appearance:
  show_theme_switcher: true
  default_theme: "system"
  show_toggle_left_sidebar: true
  show_toggle_right_sidebar: true
  container_width: "col-lg-10 mx-auto"
  content_width: "col-lg-7"
  background_noise_opacity: 0.03

git:
  enable_versioning: false
  enable_contributors_info: false

header:
  search:
    enable: true
    index_meta_data: true
    index_page_titles: true

content:
  allowedRawHtmlTags:
    - "b"
    - "i"
    - "strong"
    - "em"
    - "a"
    - "p"
    - "ul"
    - "ol"
    - "li"

  showLastUpdated: true
  lastDateUpdatedFormat: "yyyy-MM-dd HH:mm:ss"
  enableAutoFormatLinks: true
  bottom_navigation: true
  codeHighlightTheme: "default"
  share_ai_buttons: true
  share_buttons_ai_providers:
    - label: "ChatGPT"
      url: "https://chat.openai.com"
      description: "Share with ChatGPT"
    - label: "Claude"
      url: "https://claude.ai"
      description: "Share with Claude"
    - label: "Gemini"
      url: "https://gemini.google.com"
      description: "Share with Gemini"
    - label: "Copilot"
      url: "https://github.com/copilot/"
      description: "Share with GitHub Copilot"


navbar:
  - title: "Home"
    url: "/"
    icon: ""
  - title: "Docs"
    url: "/docs"
    icon: "icon-book"

sidebar_navigation:
  - name: "Getting Started"
    items:
      - title: "Introduction"
        url: "/"
        icon: ""
      - title: "Installation"
        url: "/install"
        icon: "icon-download"

  - name: "Language"
    items:
      - title: "Syntax"
        url: "/language/syntax"
      - title: "Variables"
        url: "/language/variables"
      - title: "Functions"
        url: "/language/functions"
      - title: "Macros"
        url: "/language/macros"
      - title: "Control Flow"
        url: "/language/control-flow"


  - name: "Standard Library"
    items:
      - title: "System"
        url: "/lib/system"
      - title: "Math"
        url: "/lib/math"
      - title: "Strings"
        url: "/lib/strings"
      - title: "Arrays"
        url: "/lib/arrays"
      - title: "Objects"
        url: "/lib/objects"
  
  - name: "Package Manager"
    items:
      - title: "Manage Packages"
        url: "/package-manager"

      - title: "Creating Packages"
        url: "/package-manager/creating-packages"

      - title: "Publishing Packages"
        url: "/package-manager/publishing-packages"

  - name: "Source-to-Source Transpilation"
    items:
      - title: "Overview"
        url: "/transpilation/overview"

      - title: "Supported Languages"
        url: "/transpilation/supported-languages"

      - title: "Examples"
        url: "/transpilation/examples"
      
      - title: "Configuration"
        url: "/transpilation/configuration"

extra_sections:
  left_sidebar:
    - title: ""
      content: ""
  right_sidebar:
    - title: ""
      content: ""

footer:
  text: ""
  links:
    - title: "GitHub"
      url: "https://github.com/example"
      icon: "icon-brand-github"